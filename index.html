<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Albert Roi" />
    <title>Albert Roi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="hero">
      <h1 class="hero__title">Albert Roi</h1>
    </header>

    <section class="gallery">
      <figure class="gallery__item">
        <img
          src="images/masculine-variant.png"
          alt="Albert Roi"
          class="gallery__image"
          width="800"
          height="800"
          loading="lazy"
        />
        <figcaption class="gallery__name">Albert Roi</figcaption>
      </figure>

      <figure class="gallery__item">
        <img
          src="images/feminine-variant.png"
          alt="Albert Roi"
          class="gallery__image"
          width="800"
          height="800"
          loading="lazy"
        />
        <figcaption class="gallery__name">Albert Roi</figcaption>
      </figure>
    </section>
  </body>
</html>
